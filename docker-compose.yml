services:
  backend:
    image: ${BACKEND_IMAGE_REF:?BACKEND_IMAGE_REF is required}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      DEBUG: "false"
      DB_ENGINE: mysql
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:?DB_NAME is required}
      DB_USER: ${DB_USER:?DB_USER is required}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ${MEDIA_ROOT_HOST:-./runtime/media}:/app/media
      - ${STATIC_ROOT_HOST:-./runtime/static}:/app/static
      - ${LOG_ROOT_HOST:-./runtime/logs}:/app/logs
    expose:
      - "8000"

  frontend:
    image: ${FRONTEND_IMAGE_REF:?FRONTEND_IMAGE_REF is required}
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      NODE_ENV: production
      PORT: 3000
      API_URL: http://backend:8000
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL is required}
      AUTH_URL: ${AUTH_URL:-${NEXTAUTH_URL}}
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ${MEDIA_ROOT_HOST:-./runtime/media}:/srv/media:ro
      - ${STATIC_ROOT_HOST:-./runtime/static}:/srv/static:ro
    depends_on:
      - backend
      - frontend

networks:
  default:
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET:-172.20.0.0/16}
